name: Integration Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mina:
        image: o1labs/mina-local-network:compatible-latest-lightnet
        env:
          NETWORK_TYPE: single-node
          PROOF_LEVEL: none
          LOG_LEVEL: Info
          RUN_ARCHIVE_NODE: false
          SLOT_TIME: 20000
        ports:
          - 8080:8080
          - 8181:8181
          - 3085:3085

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Wait for Mina network
        uses: o1-labs/wait-for-mina-network-action@v1
        with:
          mina-graphql-port: "8080"
          max-attempts: "60"
          polling-interval-ms: "10000"

      - name: Acquire test accounts
        id: accounts
        run: |
          # The faucet's unlockAccount=true imports and unlocks the key in the
          # daemon wallet. This can fail if the daemon's keystore isn't ready yet,
          # so retry with back-off.
          for i in $(seq 1 60); do
            SENDER=$(curl -s "http://127.0.0.1:8181/acquire-account?unlockAccount=true" 2>&1 || true)
            if echo "$SENDER" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'pk' in d" 2>/dev/null; then
              echo "Sender acquired on attempt $i: $SENDER"
              break
            fi
            echo "Attempt $i/60 - Response: $SENDER"
            sleep 10
          done

          SENDER_PK=$(echo "$SENDER" | python3 -c "import sys,json; print(json.load(sys.stdin)['pk'])")
          if [ -z "$SENDER_PK" ]; then
            echo "::error::Failed to acquire sender account"
            exit 1
          fi

          RECEIVER=$(curl -s "http://127.0.0.1:8181/acquire-account")
          RECEIVER_PK=$(echo "$RECEIVER" | python3 -c "import sys,json; print(json.load(sys.stdin)['pk'])")

          echo "sender_pk=$SENDER_PK" >> "$GITHUB_OUTPUT"
          echo "receiver_pk=$RECEIVER_PK" >> "$GITHUB_OUTPUT"
          echo "Sender: $SENDER_PK"
          echo "Receiver: $RECEIVER_PK"

      - name: Run integration tests
        env:
          MINA_GRAPHQL_URI: http://127.0.0.1:8080/graphql
          MINA_TEST_SENDER_KEY: ${{ steps.accounts.outputs.sender_pk }}
          MINA_TEST_RECEIVER_KEY: ${{ steps.accounts.outputs.receiver_pk }}
        run: cargo test --test integration_tests -- --test-threads=1

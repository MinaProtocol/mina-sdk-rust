name: Integration Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mina:
        image: o1labs/mina-local-network:compatible-latest-lightnet
        env:
          NETWORK_TYPE: single-node
          PROOF_LEVEL: none
          LOG_LEVEL: Info
          RUN_ARCHIVE_NODE: false
          SLOT_TIME: 20000
        ports:
          - 8080:8080
          - 8181:8181
          - 3085:3085

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Wait for Mina network
        uses: o1-labs/wait-for-mina-network-action@v1
        with:
          mina-graphql-port: "8080"
          max-attempts: "60"
          polling-interval-ms: "10000"

      - name: Acquire test accounts
        id: accounts
        run: |
          # Acquire accounts without unlock (more reliable)
          SENDER=$(curl -s http://127.0.0.1:8181/acquire-account)
          RECEIVER=$(curl -s http://127.0.0.1:8181/acquire-account)
          echo "Sender response: $SENDER"
          echo "Receiver response: $RECEIVER"
          SENDER_PK=$(echo "$SENDER" | python3 -c "import sys,json; print(json.load(sys.stdin)['pk'])")
          RECEIVER_PK=$(echo "$RECEIVER" | python3 -c "import sys,json; print(json.load(sys.stdin)['pk'])")

          # Unlock sender via GraphQL
          UNLOCK_QUERY='mutation($input: UnlockInput!) { unlockAccount(input: $input) { publicKey } }'
          SENDER_SK=$(echo "$SENDER" | python3 -c "import sys,json; print(json.load(sys.stdin)['sk'])")
          for i in $(seq 1 30); do
            RESULT=$(curl -s http://127.0.0.1:8080/graphql \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"$UNLOCK_QUERY\", \"variables\": {\"input\": {\"publicKey\": \"$SENDER_PK\", \"password\": \"\"}}}")
            echo "Unlock attempt $i: $RESULT"
            echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['data']['unlockAccount']['publicKey']" 2>/dev/null && break
            sleep 10
          done

          echo "sender_pk=$SENDER_PK" >> "$GITHUB_OUTPUT"
          echo "receiver_pk=$RECEIVER_PK" >> "$GITHUB_OUTPUT"
          echo "Sender: $SENDER_PK"
          echo "Receiver: $RECEIVER_PK"

      - name: Run integration tests
        env:
          MINA_GRAPHQL_URI: http://127.0.0.1:8080/graphql
          MINA_TEST_SENDER_KEY: ${{ steps.accounts.outputs.sender_pk }}
          MINA_TEST_RECEIVER_KEY: ${{ steps.accounts.outputs.receiver_pk }}
        run: cargo test --test integration_tests -- --test-threads=1

name: Integration Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mina:
        image: o1labs/mina-local-network:compatible-latest-lightnet
        env:
          NETWORK_TYPE: single-node
          PROOF_LEVEL: none
          LOG_LEVEL: Info
          RUN_ARCHIVE_NODE: false
          SLOT_TIME: 20000
        ports:
          - 8080:8080
          - 8181:8181
          - 3085:3085

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Wait for Mina network
        uses: o1-labs/wait-for-mina-network-action@v1
        with:
          mina-graphql-port: "8080"
          max-attempts: "60"
          polling-interval-ms: "10000"

      - name: Acquire test accounts
        id: accounts
        run: |
          # Query daemon for accounts already in its wallet (pre-loaded by lightnet)
          WALLETS_QUERY='{ ownedWallets { publicKey locked } }'
          for i in $(seq 1 30); do
            RESULT=$(curl -s http://127.0.0.1:8080/graphql \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"$WALLETS_QUERY\"}")
            echo "Wallet query attempt $i: $RESULT"
            WALLET_COUNT=$(echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          wallets = d.get('data', {}).get('ownedWallets') or []
          print(len(wallets))
          " 2>/dev/null)
            if [ "$WALLET_COUNT" -gt "1" ] 2>/dev/null; then
              break
            fi
            sleep 10
          done

          # Pick sender (first wallet) and receiver (second wallet), unlock sender
          read SENDER_PK RECEIVER_PK <<< $(echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          wallets = d['data']['ownedWallets']
          print(wallets[0]['publicKey'], wallets[1]['publicKey'])
          ")

          # Unlock sender if locked
          UNLOCK_QUERY='mutation(\$input: UnlockInput!) { unlockAccount(input: \$input) { publicKey } }'
          curl -s http://127.0.0.1:8080/graphql \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"$UNLOCK_QUERY\", \"variables\": {\"input\": {\"publicKey\": \"$SENDER_PK\", \"password\": \"\"}}}"

          echo "sender_pk=$SENDER_PK" >> "$GITHUB_OUTPUT"
          echo "receiver_pk=$RECEIVER_PK" >> "$GITHUB_OUTPUT"
          echo "Sender PK: $SENDER_PK"
          echo "Receiver PK: $RECEIVER_PK"

      - name: Run integration tests
        env:
          MINA_GRAPHQL_URI: http://127.0.0.1:8080/graphql
          MINA_TEST_SENDER_KEY: ${{ steps.accounts.outputs.sender_pk }}
          MINA_TEST_RECEIVER_KEY: ${{ steps.accounts.outputs.receiver_pk }}
        run: cargo test --test integration_tests -- --test-threads=1
